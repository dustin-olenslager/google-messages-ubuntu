<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Connection Error</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #1a73e8;
      --accent-hover: #1557b0;
      --text-primary: #e0e0e0;
      --text-secondary: #9aa0a6;
      --error-color: #f28b82;
      --border: rgba(255, 255, 255, 0.08);
      --radius: 12px;
    }

    html, body {
      height: 100%;
      font-family: 'Google Sans', Roboto, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(242, 139, 130, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      color: var(--error-color);
    }

    h1 {
      font-size: 24px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .error-detail {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: 'Roboto Mono', monospace;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      margin: 20px 0 32px;
      text-align: left;
      word-break: break-all;
      display: none; /* shown by JS if detail present */
    }

    .error-detail.visible {
      display: block;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 28px;
      border-radius: 24px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
    }

    .status-banner {
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 8px;
      margin-bottom: 24px;
      display: none;
    }

    .status-banner.offline {
      display: block;
      background: rgba(242, 139, 130, 0.12);
      border: 1px solid rgba(242, 139, 130, 0.3);
      color: var(--error-color);
    }

    .status-banner.online {
      display: block;
      background: rgba(129, 201, 149, 0.12);
      border: 1px solid rgba(129, 201, 149, 0.3);
      color: #81c995;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 9v4M12 17h.01"/>
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      </svg>
    </div>

    <h1>Can't connect to Messages</h1>

    <p class="subtitle" id="subtitle-text">
      There was a problem loading Google Messages. Check your internet connection and try again.
    </p>

    <div class="status-banner" id="status-banner"></div>

    <div class="error-detail" id="error-detail"></div>

    <div class="actions">
      <button class="btn-primary" id="retry-btn">Try Again</button>
      <button class="btn-secondary" id="details-btn">Show Details</button>
    </div>
  </div>

  <script src="error.js"></script>
</body>
</html>
